name: CI

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  perl-versions:
    runs-on: ubuntu-latest
    outputs:
      perl-versions: ${{ steps.perl-versions.outputs.perl-versions }}
    steps:
      - id: perl-versions
        uses: perl-actions/perl-versions@v2
        with:
          since-perl: 5.8
          with-devel: false

  test:
    needs: perl-versions
    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} / Perl ${{ matrix.perl-version }}"

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        perl-version: ${{ fromJson(needs.perl-versions.outputs.perl-versions) }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}
      - run: perl -V
      - name: Install Dependencies
        run: cpanm --installdeps .
      - name: Build Module
        run: |
          perl Makefile.PL
          make
      - name: Run Tests
        run: prove -lv t
